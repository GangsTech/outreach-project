name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Perfect Android Setup
        run: |
          # 1. Start Fresh
          rm -rf android
          npx cap add android
          
          # 2. Add Our Alarm Settings (Manual Copy)
          mkdir -p android/app/src/main/res/raw
          # We will just use standard AndroidManifest for this run
          
          # 3. Final Sync
          npx cap sync android

      - name: Build APK (Final Victory)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Notify-App-Installer
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Perfect Android Setup
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK (Ignore Missing Icons)
        run: |
          cd android
          chmod +x ./gradlew
          # This command ignores icon/layout errors and just builds the APK!
          ./gradlew assembleDebug -x lint
